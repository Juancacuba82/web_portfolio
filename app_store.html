<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store App Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #12121c;
            --accent: #25d366; /* WhatsApp Green */
            --bg: #0a0a0f;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: white; padding: 0; overflow-x: hidden; min-height: 100vh; }
        
        .product-img {
            width: 100%;
            height: 200px;
            background-image: url('app2.png');
            background-size: cover;
            background-position: center;
            border-bottom: 2px solid #333;
        }

        .content { padding: 15px; }
        .badge { background: #333; color: #ccc; padding: 3px 6px; border-radius: 4px; font-size: 0.65rem; text-transform: uppercase; margin-bottom: 8px; display: inline-block; }
        h1 { font-size: 1.3rem; margin-bottom: 5px; }
        .price { font-size: 1.2rem; color: #00d4ff; font-weight: 800; margin-bottom: 15px; }
        
        .specs { margin-bottom: 20px; }
        .spec-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #222; font-size: 0.85rem; }
        .spec-item span:first-child { color: #888; }

        .counter { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; background: #1a1a1a; padding: 8px; border-radius: 12px; width: fit-content; }
        .counter button { background: none; border: 1px solid #444; color: white; width: 25px; height: 25px; border-radius: 50%; cursor: pointer; }
        
        .whatsapp-btn {
            background: var(--accent);
            color: white;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-weight: 800;
            text-decoration: none;
            display: block;
            margin-bottom: 10px;
            transition: transform 0.2s;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .whatsapp-btn:active { transform: scale(0.95); }
        
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 100;
        }
        .modal-content { background: #1a1a1a; padding: 30px; border-radius: 20px; text-align: center; border: 1px solid #333; width: 100%; }
        .close-btn { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 8px; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="product-img"></div>
    <div class="content">
        <span class="badge">Novedad 2026</span>
        <h1>Maquinaria Industrial RXG</h1>
        <div class="price">USD $45,000</div>
        
        <div class="specs">
            <div class="spec-item"><span>Marca</span> <span>MetalTruck</span></div>
            <div class="spec-item"><span>Material</span> <span>Acero Inoxidable</span></div>
            <div class="spec-item"><span>Capacidad</span> <span>5000L</span></div>
        </div>

        <div class="counter">
            <button onclick="changeQty(-1)">-</button>
            <span id="qty">1</span>
            <button onclick="changeQty(1)">+</button>
        </div>

        <div class="whatsapp-btn" onclick="openModal()">CONSULTAR STOCK</div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h2 style="color: #25d366; margin-bottom: 10px;">¡Consulta Enviada!</h2>
            <p style="color: #aaa; font-size: 0.9rem;">Un asesor se pondrá en contacto contigo en breve.</p>
            <button class="close-btn" onclick="closeModal()">Cerrar</button>
        </div>
    </div>

    <script>
        let qty = 1;
        function changeQty(val) {
            qty = Math.max(1, qty + val);
            document.getElementById('qty').innerText = qty;
        }
        function openModal() {
            document.getElementById('modal').style.display = 'flex';
        }
        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }
    </script>
</body>
</html>
