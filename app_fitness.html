<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness App Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6b21a8;
            --accent: #00d4ff;
            --bg: #f8f9fa;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); padding: 15px; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .header h1 { font-size: 1.1rem; font-weight: 800; color: #333; }
        .profile { width: 35px; height: 35px; background: #ddd; border-radius: 50%; }
        
        .card { background: white; border-radius: 16px; padding: 15px; box-shadow: 0 8px 16px rgba(0,0,0,0.04); margin-bottom: 15px; }
        .stats { display: flex; justify-content: space-around; text-align: center; }
        .stat-item h2 { font-size: 1.2rem; color: var(--primary); }
        .stat-item p { font-size: 0.75rem; color: #888; }

        .progress-container { display: flex; justify-content: center; align-items: center; position: relative; height: 130px; }
        .circle-bg { 
            width: 110px; height: 110px; border-radius: 50%; 
            background: #eee;
            display: flex; justify-content: center; align-items: center;
            position: relative;
        }
        .circle-progress {
            width: 110px; height: 110px; border-radius: 50%;
            background: conic-gradient(var(--accent) 0deg, #eee 0deg);
            position: absolute;
            transition: background 0.1s;
        }
        .circle-inner {
            width: 90px; height: 90px; border-radius: 50%;
            background: white;
            z-index: 2;
            display: flex; justify-content: center; align-items: center;
        }
        .percentage { font-size: 1.3rem; font-weight: 800; color: #333; z-index: 3; }

        .btn { 
            background: var(--primary); color: white; border: none; padding: 12px; 
            border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.3s;
            margin-top: auto; font-size: 0.9rem;
        }
        .btn:active { transform: scale(0.95); background: var(--accent); }
        
        .activity-list { list-style: none; margin-bottom: 10px; }
        .activity-item { 
            display: flex; align-items: center; gap: 10px; padding: 8px; 
            border-bottom: 1px solid #eee; font-size: 0.85rem;
        }
        .icon { width: 25px; height: 25px; background: #f0f0f0; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Mi Progreso</h1>
        <div class="profile"></div>
    </div>

    <div class="card">
        <div class="progress-container">
            <div class="circle-progress" id="progress"></div>
            <div class="circle-inner">
                <div class="percentage" id="pct">0%</div>
            </div>
        </div>
    </div>

    <div class="stats card">
        <div class="stat-item">
            <h2 id="steps">1,240</h2>
            <p>Pasos</p>
        </div>
        <div class="stat-item">
            <h2>450</h2>
            <p>Kcal</p>
        </div>
    </div>

    <ul class="activity-list">
        <li class="activity-item"><div class="icon">🏃</div> Caminata Matutina</li>
        <li class="activity-item"><div class="icon">🏋️</div> Entrenamiento Pesas</li>
    </ul>

    <button class="btn" onclick="startWorkout()">Iniciar Entrenamiento</button>

    <script>
        let count = 0;
        function startWorkout() {
            const btn = document.querySelector('.btn');
            const progress = document.getElementById('progress');
            btn.innerText = "Entrenando...";
            const interval = setInterval(() => {
                count += 1;
                document.getElementById('pct').innerText = count + "%";
                progress.style.background = `conic-gradient(var(--accent) ${count * 3.6}deg, #eee 0deg)`;
                document.getElementById('steps').innerText = (1240 + count * 10).toLocaleString();
                if (count >= 100) {
                    clearInterval(interval);
                    btn.innerText = "¡Completado!";
                    setTimeout(() => {
                        count = 0;
                        btn.innerText = "Iniciar Entrenamiento";
                    }, 2000);
                }
            }, 50);
        }
    </script>
</body>
</html>
